name: ai-media-generator-release

on:
  workflow_dispatch:
  push:
    tags:
      - "ai-media-generator-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: ai-media-generator-x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: ai-media-generator-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: ai-media-generator-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ai-media-generator-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build target
        run: cargo build --release --manifest-path cli/genmedia/Cargo.toml --target ${{ matrix.target }}

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ matrix.asset }}" == *.exe ]]; then
            cp "cli/genmedia/target/${{ matrix.target }}/release/ai-media.exe" "release/${{ matrix.asset }}"
          else
            cp "cli/genmedia/target/${{ matrix.target }}/release/ai-media" "release/${{ matrix.asset }}"
            chmod +x "release/${{ matrix.asset }}"
          fi

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/ai-media-generator-v')
        with:
          files: release/${{ matrix.asset }}
